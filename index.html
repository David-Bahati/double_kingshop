<!doctype html>
<html lang="fr" class="light">
  <head>
    <!-- 🔤 Encodage & Compatibilité -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- 📱 Viewport & Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    
    <!-- 🔍 SEO & Métadonnées -->
    <title>Double King Shop • Gestion Commerciale • Bunia, RDC</title>
    <meta name="title" content="Double King Shop - Gestion Commerciale" />
    <meta name="description" content="Plateforme de vente en ligne pour accessoires informatiques à Bunia, Ituri. Paiements Pi Network, Mobile Money et Cash." />
    <meta name="keywords" content="Double King Shop, Bunia, informatique, accessoires, Pi Network, Mobile Money, RDC, Ituri, e-commerce" />
    <meta name="author" content="Double King Shop" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="fr" />
    <meta name="revisit-after" content="7 days" />
    
    <!-- 🌐 Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://doublekingshop.cd/" />
    <meta property="og:title" content="Double King Shop • Gestion Commerciale" />
    <meta property="og:description" content="Votre boutique informatique professionnelle à Bunia, Ituri. Paiements sécurisés Pi Network & Mobile Money." />
    <meta property="og:image" content="https://doublekingshop.cd/og-image.jpg" />
    <meta property="og:site_name" content="Double King Shop" />
    <meta property="og:locale" content="fr_CD" />
    
    <!-- 🐦 Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://doublekingshop.cd/" />
    <meta name="twitter:title" content="Double King Shop • Gestion Commerciale" />
    <meta name="twitter:description" content="Boutique informatique à Bunia • Pi Network & Mobile Money acceptés" />
    <meta name="twitter:image" content="https://doublekingshop.cd/og-image.jpg" />
    
    <!-- 🔗 Canonical & Alternate -->
    <link rel="canonical" href="https://doublekingshop.cd/" />
    <link rel="alternate" hreflang="fr" href="https://doublekingshop.cd/" />
    
    <!-- 🎨 Favicon & App Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />    <link rel="manifest" href="/manifest.json" />
    
    <!-- 🚀 Performance: Preconnect & Preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://sdk.minepi.com" crossorigin />
    <link rel="preconnect" href="https://api.fedapay.com" crossorigin />
    
    <!-- Fonts: Inter avec display swap pour éviter le FOIT -->
    <link 
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" 
      rel="stylesheet" 
    />
    
    <!-- 🌓 Anti-flicker CSS pour le mode sombre (avant le chargement du JS) -->
    <script>
      (function() {
        // Vérifier le thème sauvegardé ou la préférence système
        const theme = localStorage.getItem('dks-theme') || 
                     (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.classList.toggle('dark', theme === 'dark');
        document.documentElement.classList.add(theme);
      })();
    </script>
    
    <!-- 🎨 Styles critiques inline (optionnel mais recommandé pour le LCP) -->
    <style>
      /* Reset minimal pour éviter le flash non-stylé */
      #root { min-height: 100vh; }
      
      /* Loading state initial */
      .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #f8fafc;
        color: #0f172a;
        font-family: 'Inter', system-ui, sans-serif;
      }
      .dark .app-loading {
        background: #0f172a;
        color: #f1f5f9;
      }
      
      /* Spinner */
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #e2e8f0;        border-top-color: #2563eb;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      
      /* Masquer le contenu jusqu'au chargement de React (optionnel) */
      /* #root:not(:has(*)) { display: none; } */
    </style>
  </head>
  
  <body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 transition-colors">
    
    <!-- 🎯 Root de l'application React -->
    <div id="root">
      <!-- Fallback loading state (affiché avant que React ne monte) -->
      <div class="app-loading">
        <div class="text-center">
          <div class="spinner mx-auto mb-4"></div>
          <p class="text-sm font-medium">Chargement de Double King Shop...</p>
          <p class="text-xs text-slate-400 mt-2">Bunia, Ituri • RDC</p>
        </div>
      </div>
    </div>
    
    <!-- 🧩 Scripts de l'application -->
    <script type="module" src="./src/main.jsx"></script>  

    
    <!-- 🥧 Pi Network SDK (chargement différé pour ne pas bloquer le rendu) -->
    <script 
      src="https://sdk.minepi.com/pi-sdk.js" 
      async 
      defer
      crossorigin="anonymous"
      integrity="sha384-PLACEHOLDER_INTEGRITY_HASH"
    ></script>
    
    <!-- 📊 Analytics (optionnel - à configurer) -->
    <!-- <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX', { anonymize_ip: true });
    </script> -->
    
    <!-- 🔔 Service Worker Registration (PWA) 
    <script>
      if ('serviceWorker' in navigator && window.location.protocol === 'https:') {
        window.addEventListener('load', () => {          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW enregistré:', reg.scope))
            .catch(err => console.log('SW échec:', err));
        });
      }
    </script>  -->
    
    <!-- 🛡️ Security: Prevent XSS via meta (complémentaire aux headers HTTP) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://sdk.minepi.com https://api.fedapay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.minepi.com https://api.fedapay.com https://doublekingshop.cd;" />
    
  </body>
</html>
